name: Validar Secrets

on:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar secrets cadastrados
        run: |
          check_secret() {
            local nome="$1"
            local valor="$2"
            local tamanho=${#valor}
            if [ -z "$valor" ]; then
              echo "❌ $nome está VAZIO ou não cadastrado"
              echo "FALHOU=1" >> "$GITHUB_ENV"
            else
              echo "✅ $nome presente (tamanho: $tamanho caracteres)"
            fi
          }

          check_secret "ANDROID_KEYSTORE_BASE64" "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          check_secret "ANDROID_KEY_ALIAS" "${{ secrets.ANDROID_KEY_ALIAS }}"
          check_secret "ANDROID_KEYSTORE_PASSWORD" "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          check_secret "ANDROID_KEY_PASSWORD" "${{ secrets.ANDROID_KEY_PASSWORD }}"
          check_secret "GOOGLE_SERVICE_ACCOUNT_JSON" "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}"

          if [ "$FALHOU" == "1" ]; then
            echo ""
            echo "Um ou mais secrets estão faltando. Abortando antes do build."
            exit 1
          fi